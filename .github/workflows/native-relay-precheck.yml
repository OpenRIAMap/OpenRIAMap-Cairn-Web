name: Native RelayPackage Precheck

on:
  workflow_dispatch:
    inputs:
      relay_package_path:
        description: "Path to a Native RelayPackage .zip or directory inside this repository"
        required: true
        type: string
      project_id:
        description: "Cairn project id"
        required: false
        default: "openriamap-ria"
        type: string
      data_root:
        description: "Optional data root path for dry-run comparison, if available in the runner checkout"
        required: false
        default: ""
        type: string
      strict_worlds:
        description: "Fail on unregistered world directories"
        required: false
        default: false
        type: boolean
      review_status_path:
        description: "Optional review-status.json path to update after precheck"
        required: false
        default: ""
        type: string
      review_package_root:
        description: "Optional RelayPackage review package root for status metadata"
        required: false
        default: ""
        type: string
      update_review_status:
        description: "Update review-status.json after precheck"
        required: false
        default: false
        type: boolean

jobs:
  precheck:
    name: RelayPackage precheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Native RelayPackage precheck
        shell: bash
        run: |
          args=(
            "--relay" "${{ inputs.relay_package_path }}"
            "--project-id" "${{ inputs.project_id }}"
            "--out" ".cairnmap-actions/native-relay-precheck"
          )
          if [ -n "${{ inputs.data_root }}" ]; then
            args+=("--data-root" "${{ inputs.data_root }}")
          fi
          if [ "${{ inputs.strict_worlds }}" = "true" ]; then
            args+=("--strict-worlds")
          fi
          if [ -n "${{ inputs.review_status_path }}" ]; then
            args+=("--review-status-path" "${{ inputs.review_status_path }}")
          fi
          if [ -n "${{ inputs.review_package_root }}" ]; then
            args+=("--review-package-root" "${{ inputs.review_package_root }}")
          fi
          if [ "${{ inputs.update_review_status }}" = "true" ]; then
            args+=("--update-review-status" "--precheck-run-id" "${{ github.run_id }}")
          fi
          npm run action:native-relay-precheck -- "${args[@]}"

      - name: Upload precheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-relay-precheck
          path: .cairnmap-actions/native-relay-precheck
          if-no-files-found: warn
